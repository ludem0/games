services:
  app:
    build: ./app
    volumes:
      - ./users.json:/app/users.json:ro
    env_file: .env
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge
